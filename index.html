<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lab 1_2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <header>
        <h1>Qeydiyyat formu</h1>
    </header>


    <main>



        <div id="form">

            <div>
                <p><i class="fa-solid fa-user"></i></p>
                <input type="text" id="name" placeholder="Adınızı daxil edin" required>
            </div>

            <div>
                <p><i class="fa-solid fa-address-card"></i></p>
                <input type="text" id="surname" placeholder="Soyadınızı daxil edin" required>
            </div>

            <div>
                <p><i class="fa-solid fa-cake-candles"></i></p>
                <input type="number" id="age" placeholder="Yaşınızı daxil edin" required>
            </div>

            <div>
                <p><i class="fa-solid fa-phone"></i></p>
                <input type="text" id="email" placeholder="Nömrəsinizi daxil edin" required>
            </div>


            <div>
                <p><i class="fa-solid fa-envelope"></i></p>
                <input type="email" id="email" placeholder="Emailinizi daxil edin" required>
            </div>

        </div>
        <div id="footer-div">Göndər</div>


    </main>

    <footer>
        <ul>
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
            <li>6</li>
            <li>7</li>
            <li>8</li>
            <li>9</li>
            <li>10</li>
        </ul>
    </footer>


    <script src="app.js"></script>
</body>

</html>
